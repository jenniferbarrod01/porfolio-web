<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Jennifer Barrio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-green': '#4F6057',
                        'brand-dark': '#1a1a1a',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex flex-col">

    <nav class="p-6">
        <a href="index.html" class="text-brand-green font-bold flex items-center gap-2 hover:text-brand-dark transition">
            <i class="fas fa-arrow-left"></i> Volver al Inicio
        </a>
    </nav>

    <main class="flex-grow container mx-auto px-6 py-12">
        <div class="max-w-xl mx-auto bg-white p-8 rounded-2xl shadow-xl border border-slate-100">
            <div class="text-center mb-10">
                <h1 class="text-3xl font-bold text-brand-dark mb-2 italic">Contacto</h1>
                <p class="text-slate-500 text-sm">Tu mensaje llegará directamente a:</p>
                <span class="font-bold text-brand-green">jennifer.barrod.01@gmail.com</span>
            </div>

            <!-- FORMULARIO -->
            <!-- link de Formspree -->
            <form action="https://formspree.io/f/xaqggoka" method="POST" class="space-y-6">
                <div>
                    <label class="block text-xs font-black uppercase tracking-widest text-slate-400 mb-2">Nombre</label>
                    <input type="text" name="name" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-brand-green">
                </div>

                <div>
                    <label class="block text-xs font-black uppercase tracking-widest text-slate-400 mb-2">Correo Electrónico</label>
                    <input type="email" name="_replyto" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-brand-green">
                </div>

                <div>
                    <label class="block text-xs font-black uppercase tracking-widest text-slate-400 mb-2">Mensaje</label>
                    <textarea name="message" rows="5" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-brand-green" placeholder="Cuéntame sobre tu proyecto o propuesta..."></textarea>
                </div>

                <button type="submit" class="w-full bg-brand-green text-white font-bold py-4 rounded-lg hover:bg-brand-dark transition-all shadow-lg shadow-brand-green/20 uppercase tracking-widest text-sm">
                    Enviar Mensaje
                </button>
            </form>
        </div>
    </main>

    <footer class="py-8 text-center text-[10px] text-slate-400 uppercase tracking-[0.3em]">
        Jennifer Barrio Rodríguez &copy; 2024
    </footer>

</body>
</html>
